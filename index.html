<!DOCTYPE html>
<html>
<head>
  <title>QuickStationery</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: purple;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    .container {
      padding: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
      display: inline-block;
      width: 200px;
    }
    button {
      background: purple;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  ✏️ QuickStationery – Delivered in Minutes
</header>

<div class="container">
  <h2>Products</h2>

  <div class="product">
    <h3>Pen</h3>
    <p>₹10</p>
    <button onclick="order('Pen')">Order</button>
  </div>

  <div class="product">
    <h3>Notebook</h3>
    <p>₹50</p>
    <button onclick="order('Notebook')">Order</button>
  </div>

  <div class="product">
    <h3>File</h3>
    <p>₹30</p>
    <button onclick="order('File')">Order</button>
  </div>

</div>

<script>
function order(item) {
  alert("Order placed for " + item + "!\nWe will contact you shortly.");
}
</script>

</body>
</html>
