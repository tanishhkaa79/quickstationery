<!DOCTYPE html>
<html>
<head>
  <title>QuickStationery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f7f7f7;
    }

    header {
      background: #6a0dad;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .search {
      padding: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background: #6a0dad;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    .cart-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: purple;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  ⚡ QuickStationery
</header>

<div class="search">
  <input type="text" placeholder="Search stationery...">
</div>

<div class="products">

  <div class="card">
    <h3>Pen</h3>
    <p>₹10</p>
    <button onclick="addToCart('Pen',10)">Add</button>
  </div>

  <div class="card">
    <h3>Notebook</h3>
    <p>₹50</p>
    <button onclick="addToCart('Notebook',50)">Add</button>
  </div>

  <div class="card">
    <h3>File</h3>
    <p>₹30</p>
    <button onclick="addToCart('File',30)">Add</button>
  </div>

</div>

<div class="cart-btn" onclick="checkout()">
🛒
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  alert(name + " added to cart");
}

function checkout() {
  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  let message = "Order:\n";
  let total = 0;

  cart.forEach(item => {
    message += item.name + " - ₹" + item.price + "\n";
    total += item.price;
  });

  message += "Total: ₹" + total;

  let phone = "9813020759"; // replace
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
