<!DOCTYPE html>
<html>
<head>
  <title>QuickStationery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f9fff4; }

    header {
      background: linear-gradient(90deg,#ffd400,#2ecc71);
      padding:15px;
      text-align:center;
      font-weight:bold;
    }

    .page { display:none; padding-bottom:80px; }
    .active { display:block; }

    .products {
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:12px;
      text-align:center;
    }

    .card img {
      width:100%;
      height:100px;
      object-fit:cover;
      border-radius:8px;
    }

    button {
      background:#2ecc71;
      color:white;
      border:none;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
    }

    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      background:white;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
    }

    .cart-btn {
      position:fixed;
      bottom:70px;
      right:20px;
      background:#ffd400;
      padding:15px;
      border-radius:50%;
      cursor:pointer;
    }

    #loginModal {
      display:none;
      position:fixed;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      top:0;
    }

    .modal {
      background:linear-gradient(135deg,#6a0dad,#b92b7c);
      color:white;
      padding:20px;
      width:90%;
      max-width:400px;
      margin:100px auto;
      border-radius:15px;
    }

    input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }
  </style>
</head>

<body>

<header>⚡ QuickStationery</header>

<div id="home" class="page active">
  <div class="products" id="products"></div>
</div>

<div id="orders" class="page">
  <h3>📦 Orders</h3>
  <div id="history"></div>
</div>

<div id="account" class="page">
  <h3>👤 Account</h3>
  <p id="username"></p>
  <button onclick="openLogin()">Login</button>
  <button onclick="getLocation()">📍 Location</button>
  <p id="locationText"></p>
</div>

<div class="cart-btn" onclick="checkout()">🛒</div>

<div class="bottom-nav">
  <div onclick="showPage('home')">🏠</div>
  <div onclick="showPage('orders')">📦</div>
  <div onclick="showPage('account')">👤</div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="modal">
    <h3>Login</h3>

    <div id="recaptcha-container"></div>

    <input id="phone" placeholder="+91XXXXXXXXXX">
    <button onclick="sendOTP()">Send OTP</button>

    <input id="otp" placeholder="Enter OTP" style="display:none;">
    <button onclick="verifyOTP()" id="verifyBtn" style="display:none;">Verify</button>

    <button onclick="closeLogin()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCUhTRKR6zj2mPgqBc8bSXbN6TdxOqITRc",
  authDomain: "notejet-202b8.firebaseapp.com",
  projectId: "notejet-202b8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.auth = auth;
window.RecaptchaVerifier = RecaptchaVerifier;
window.signInWithPhoneNumber = signInWithPhoneNumber;
</script>

<script>
let cart = [];
let confirmationResult;

let items = [
  {name:"Pen",price:10,img:"https://images.unsplash.com/photo-1583485088034-697b5bc36b0f"},
  {name:"Notebook",price:50,img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
  {name:"File",price:30,img:"https://images.unsplash.com/photo-1588776814546-1ffcf47267a5"}
];

function loadProducts(){
  let html="";
  items.forEach(i=>{
    html+=`<div class="card">
      <img src="${i.img}">
      <h4>${i.name}</h4>
      <p>₹${i.price}</p>
      <button onclick="cart.push({name:'${i.name}',price:${i.price}})">Add</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}
loadProducts();

function openLogin(){
  document.getElementById("loginModal").style.display="block";
}

function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

function sendOTP(){
  let phone = document.getElementById("phone").value;

  window.recaptchaVerifier = new RecaptchaVerifier(auth,'recaptcha-container',{size:'normal'});

  signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
    .then(res=>{
      confirmationResult = res;
      alert("OTP sent!");
      document.getElementById("otp").style.display="block";
      document.getElementById("verifyBtn").style.display="block";
    })
    .catch(err=>alert(err.message));
}

function verifyOTP(){
  let code = document.getElementById("otp").value;

  confirmationResult.confirm(code).then(result=>{
    let user = result.user;
    localStorage.setItem("user",user.phoneNumber);
    document.getElementById("username").innerText=user.phoneNumber;
    closeLogin();
  }).catch(()=>alert("Invalid OTP"));
}

function checkout(){
  if(cart.length==0) return alert("Cart empty");

  let total=0;
  cart.forEach(i=> total+=i.price);

  let upi = "upi://pay?pa=ritusingla07@oksbi&pn=QuickStationery&am="+total+"&cu=INR";
  window.open("https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(upi));
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("locationText").innerText=
      pos.coords.latitude.toFixed(2)+","+pos.coords.longitude.toFixed(2);
  });
}

function showPage(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}
</script>

</body>
</html>
