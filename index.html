<!DOCTYPE html>
<html>
<head>
  <title>QuickStationery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f9fff4; }

    header {
      background: linear-gradient(90deg,#ffd400,#2ecc71);
      padding:15px;
      text-align:center;
      font-weight:bold;
      font-size:20px;
    }

    .page { display:none; padding-bottom:80px; }
    .active { display:block; }

    .products {
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width:100%;
      height:100px;
      object-fit:cover;
      border-radius:8px;
    }

    button {
      background:#2ecc71;
      color:white;
      border:none;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
    }

    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      background:white;
      display:flex;
      justify-content:space-around;
      padding:10px 0;
      box-shadow:0 -2px 5px rgba(0,0,0,0.1);
    }

    .cart-btn {
      position:fixed;
      bottom:70px;
      right:20px;
      background:#ffd400;
      padding:15px;
      border-radius:50%;
      cursor:pointer;
      font-size:18px;
    }

    .section { padding:10px; }

    /* LOGIN MODAL */
    #loginModal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
    }

    .modal-box {
      width:90%;
      max-width:400px;
      background:linear-gradient(135deg,#6a0dad,#b92b7c);
      margin:100px auto;
      padding:20px;
      border-radius:15px;
      color:white;
      position:relative;
    }

    .close {
      position:absolute;
      right:15px;
      top:10px;
      cursor:pointer;
      font-size:20px;
    }

    input {
      width:100%;
      padding:10px;
      border-radius:10px;
      border:none;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>⚡ QuickStationery</header>

<!-- HOME -->
<div id="home" class="page active">
  <div class="products" id="products"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
  <div class="section">
    <h3>📦 Your Orders</h3>
    <div id="history"></div>
  </div>
</div>

<!-- ACCOUNT -->
<div id="account" class="page">
  <div class="section">
    <h3>👤 Account</h3>
    <p id="username"></p>

    <button onclick="login()">Login</button>
    <br><br>

    <h4>📍 Address</h4>
    <button onclick="getLocation()">Use Current Location</button>
    <p id="locationText"></p>

    <br>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- CART -->
<div class="cart-btn" onclick="checkout()">🛒</div>

<!-- NAV -->
<div class="bottom-nav">
  <div onclick="showPage('home')">🏠 Home</div>
  <div onclick="showPage('orders')">📦 Orders</div>
  <div onclick="showPage('account')">👤 Account</div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="modal-box">
    <span class="close" onclick="closeLogin()">✖</span>

    <h2>QuickStationery</h2>
    <p>Delivery in minutes ⚡</p>

    <input id="phoneInput" placeholder="Enter Phone Number">

    <button style="margin-top:15px; width:100%; background:#ff4da6;" onclick="submitLogin()">
      Continue
    </button>

    <p style="font-size:12px;">Terms & Privacy</p>
  </div>
</div>

<script>
let cart = [];
let user = localStorage.getItem("user");

let items = [
  {name:"Pen",price:10,img:"https://images.unsplash.com/photo-1583485088034-697b5bc36b0f"},
  {name:"Notebook",price:50,img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
  {name:"File",price:30,img:"https://images.unsplash.com/photo-1588776814546-1ffcf47267a5"}
];

function loadProducts(){
  let html="";
  items.forEach(i=>{
    html+=`
    <div class="card">
      <img src="${i.img}">
      <h4>${i.name}</h4>
      <p>₹${i.price}</p>
      <button onclick="addToCart('${i.name}',${i.price})">Add</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}
loadProducts();

function addToCart(n,p){
  cart.push({n,p});
  alert(n+" added");
}

function checkout(){
  if(!user){ alert("Login first!"); return; }
  if(cart.length==0){ alert("Cart empty"); return; }

  let total=0;
  let msg="Order:\n";

  cart.forEach(i=>{
    msg+=i.n+" ₹"+i.p+"\n";
    total+=i.p;
  });

  msg+="Total ₹"+total;

  let history = JSON.parse(localStorage.getItem("history")||"[]");
  history.push(msg);
  localStorage.setItem("history",JSON.stringify(history));
  showHistory();

  let upi = "upi://pay?pa=ritusingla007@oksbi&pn=QuickStationery&am="+total+"&cu=INR";
  window.open("https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(upi));

  cart=[];
}

function showHistory(){
  let history = JSON.parse(localStorage.getItem("history")||"[]");
  let html="";
  history.forEach(h=> html+="<p>"+h+"</p><hr>");
  document.getElementById("history").innerHTML=html;
}
showHistory();

function login(){
  document.getElementById("loginModal").style.display="block";
}

function closeLogin(){
  document.getElementById("loginModal").style.display="none";
}

function submitLogin(){
  let phone = document.getElementById("phoneInput").value;

  if(phone.length < 10){
    alert("Enter valid number");
    return;
  }

  localStorage.setItem("user",phone);
  user=phone;
  document.getElementById("username").innerText="User: "+phone;

  closeLogin();
}

function logout(){
  localStorage.removeItem("user");
  user=null;
  document.getElementById("username").innerText="";
}

if(user){
  document.getElementById("username").innerText="User: "+user;
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;
    document.getElementById("locationText").innerText=
      lat.toFixed(2)+", "+lon.toFixed(2);
  });
}

function showPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(page).classList.add("active");
}
</script>

</body>
</html>
