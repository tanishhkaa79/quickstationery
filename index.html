<!DOCTYPE html>
<html>
<head>
  <title>QuickStationery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f9fff4; }

    header {
      background: linear-gradient(90deg,#ffd400,#2ecc71);
      padding:15px;
      text-align:center;
      font-weight:bold;
      font-size:20px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:10px;
    }

    button {
      background:#2ecc71;
      color:white;
      border:none;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
    }

    .products {
      display:grid;
      grid-template-columns: repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:12px;
      text-align:center;
      box-shadow:0 3px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width:100%;
      height:100px;
      object-fit:cover;
      border-radius:8px;
    }

    .cart-btn {
      position:fixed;
      bottom:20px;
      right:20px;
      background:#ffd400;
      padding:15px;
      border-radius:50%;
      cursor:pointer;
    }

    .section {
      padding:10px;
    }
  </style>
</head>

<body>

<header>⚡ QuickStationery</header>

<div class="topbar">
  <button onclick="getLocation()">📍 Location</button>
  <button onclick="login()">👤 Login</button>
</div>

<div id="locationText" style="padding:10px;"></div>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="checkout()">🛒</div>

<div class="section">
  <h3>📦 Order History</h3>
  <div id="history"></div>
</div>

<script>
let cart = [];
let user = localStorage.getItem("user");

let items = [
  {name:"Pen",price:10,img:"https://images.unsplash.com/photo-1583485088034-697b5bc36b0f"},
  {name:"Notebook",price:50,img:"https://images.unsplash.com/photo-1519681393784-d120267933ba"},
  {name:"File",price:30,img:"https://images.unsplash.com/photo-1588776814546-1ffcf47267a5"}
];

function loadProducts(){
  let html="";
  items.forEach(i=>{
    html+=`
    <div class="card">
      <img src="${i.img}">
      <h4>${i.name}</h4>
      <p>₹${i.price}</p>
      <button onclick="addToCart('${i.name}',${i.price})">Add</button>
    </div>`;
  });
  document.getElementById("products").innerHTML=html;
}
loadProducts();

function addToCart(n,p){
  cart.push({n,p});
  alert(n+" added");
}

function checkout(){
  if(!user){ alert("Login first!"); return; }
  if(cart.length==0){ alert("Cart empty"); return; }

  let total=0;
  let msg="Order:\n";

  cart.forEach(i=>{
    msg+=i.n+" ₹"+i.p+"\n";
    total+=i.p;
  });

  msg+="Total ₹"+total;

  // save history
  let history = JSON.parse(localStorage.getItem("history")||"[]");
  history.push(msg);
  localStorage.setItem("history",JSON.stringify(history));
  showHistory();

  // UPI QR
 let upi = "upi://pay?pa=ritusingla007@oksbi&pn=QuickStationery&am="+total;
  window.open("https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(upi));

  cart=[];
}

function showHistory(){
  let history = JSON.parse(localStorage.getItem("history")||"[]");
  let html="";
  history.forEach(h=> html+="<p>"+h+"</p><hr>");
  document.getElementById("history").innerHTML=html;
}
showHistory();

function login(){
  let name = prompt("Enter your name");
  if(name){
    localStorage.setItem("user",name);
    user=name;
    alert("Logged in as "+name);
  }
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat=pos.coords.latitude;
    let lon=pos.coords.longitude;
    document.getElementById("locationText").innerText=
      "Location: "+lat.toFixed(2)+", "+lon.toFixed(2);
  });
}
</script>

</body>
</html>
