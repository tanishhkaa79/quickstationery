<!DOCTYPE html>
<html>
<head>
  <title>QuickStationery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f8f8;
    }

    header {
      background: linear-gradient(90deg, purple, #6a0dad);
      color: white;
      padding: 20px;
      font-size: 24px;
      text-align: center;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 40px;
    }

    .hero h1 {
      margin: 0;
      font-size: 32px;
    }

    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      width: 200px;
      padding: 15px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    button {
      background: purple;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #5a0ca0;
    }
  </style>
</head>

<body>

<header>
  ✏️ QuickStationery
</header>

<div class="hero">
  <h1>Stationery delivered in minutes ⚡</h1>
  <p>Forgot your pen before exam? We got you.</p>
</div>

<div class="products">

  <div class="card">
    <h3>Pen</h3>
    <p>₹10</p>
    <button onclick="order('Pen')">Order Now</button>
  </div>

  <div class="card">
    <h3>Notebook</h3>
    <p>₹50</p>
    <button onclick="order('Notebook')">Order Now</button>
  </div>

  <div class="card">
    <h3>File</h3>
    <p>₹30</p>
    <button onclick="order('File')">Order Now</button>
  </div>

</div>

<script>
function order(item) {
  let phone = "9813020759"; // PUT YOUR NUMBER HERE
  let message = "I want to order: " + item;
  let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
  window.open(url, "_blank");
}
</script>

</body>
</html>
